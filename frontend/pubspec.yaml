publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.5
  geolocator: ^11.1.0
  permission_handler: ^11.3.1
  provider: ^6.1.2
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.10.0
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.6
  flutter_local_notifications: ^22.0.1
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  geocoding: ^4.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true